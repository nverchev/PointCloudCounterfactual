# User settings

seed:  # random seed

# Options for training efficiency
cpu: false  # false enables acceleration
n_workers: 0  # 0 means that the data will be loaded in the main process
n_subprocesses: 0  # number of subprocesses used for training (0 for no parallelism)
checkpoint_every: 100  # save a checkpoint of the model after every n epochs
flow_stage: null  # train a specific stage (3, 2, 1) or all if null
load_checkpoint: 0  # load a checkpoint from the experiments folder, -1 indicates loading the latest checkpoint

# Optional trackers for monitoring the experiment
trackers:
  hydra: true  # saves a local copy of the config file
  tensorboard: false  # start a tensorboard server and log metrics
  wandb: false  # logs metrics to wandb
  sqlalchemy: false  # saves metrics to a local database
  csv: true  # saves metrics to a csv file

# Options for random generation
generate:
  batch_size: 16  # number of samples to generate
  bias_dim: 0   # insert a bias term in the latent space
  bias_value: 0.  # value of the bias term

# Options for visualization
plot:
    interactive: false  # use plotly to visualize the 3D point clouds, otherwise save them as images
    sample_indices: [0, 9, 16, 20, 25, 34, 39, 44, 46, 66, 91, 98]  # indices of the clouds to visualize
