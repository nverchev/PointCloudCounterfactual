study_name:
  latent_decoder

n_trials: 300

params:

  autoencoder.model.latent_decoder.proj_dim:
    suggest: suggest_categorical
    settings:
      choices: [128, 256, 512]

  autoencoder.model.latent_decoder.n_heads:
    suggest: suggest_categorical
    settings:
      choices: [4, 8, 16]

  autoencoder.model.latent_decoder.n_transformer_layers:
    suggest: suggest_int
    settings:
      low: 3
      high: 5

  autoencoder.model.latent_decoder.feedforward_dim:
    suggest: suggest_categorical
    settings:
      choices: [256, 512, 1024]

  autoencoder.model.latent_decoder.transformer_dropout:
    suggest: suggest_float
    settings:
      low: 0.
      high: 0.2
