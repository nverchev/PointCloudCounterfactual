study_name:
  latent_decoder

n_trials: 300

params:

  autoencoder.model.latent_decoder.mlp_dims:
    suggest: suggest_list
    settings:
      min_length: 1
      max_length: 3
      suggest: suggest_categorical
      settings:
        choices: [256, 512, 1024]

  autoencoder.model.latent_decoder.dropout_rate:
    suggest: suggest_float
    settings:
      low: 0.0
      high: 0.2
