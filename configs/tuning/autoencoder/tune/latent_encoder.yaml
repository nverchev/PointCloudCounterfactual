study_name:
  latent_encoder

n_trials: 300

params:

  autoencoder.model.latent_encoder.proj_dim:
    suggest: suggest_categorical
    settings:
      choices: [256, 512]

  autoencoder.model.latent_encoder.n_heads:
    suggest: suggest_categorical
    settings:
      choices: [4, 8, 16]

  autoencoder.model.latent_encoder.n_transformer_layers:
    suggest: suggest_int
    settings:
      low: 1
      high: 3

  autoencoder.model.latent_encoder.feedforward_dim:
    suggest: suggest_categorical
    settings:
      choices: [256, 512, 1024]
