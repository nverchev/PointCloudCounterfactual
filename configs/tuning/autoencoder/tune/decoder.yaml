study_name:
  decoder


n_trials: 300
n_startup_trials: 15

params:

  autoencoder.model.decoder.map_dims:
    suggest: suggest_list
    settings:
      min_length: 1
      max_length: 3
      suggest: suggest_categorical
      settings:
        choices: [16, 32, 64]

  autoencoder.model.decoder.conv_dims:
    suggest: suggest_list
    settings:
      min_length: 1
      max_length: 3
      suggest: suggest_categorical
      settings:
        choices: [256, 512, 1024]
